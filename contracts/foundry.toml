[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200
solc_version = "0.8.20"

[rpc_endpoints]
ritual = "${RITUAL_RPC_URL:-https://rpc.ritualfoundation.org}"

[etherscan]
ritual = { key = "unused", url = "${RITUAL_VERIFIER_URL:-https://explorer.ritualfoundation.org/api/verify/}" }
